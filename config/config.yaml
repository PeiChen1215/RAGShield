# RAGShield 统一配置文件
# 通过修改 profile 和 device 字段切换 GPU/CPU 模式

profile: cpu  # gpu | cpu

embedding:
  model: BAAI/bge-small-zh-v1.5  # cpu 默认；gpu 时改为 BAAI/bge-m3
  device: cpu                     # cuda | cpu
  batch_size: 8                   # cpu: 8；gpu: 32
  compile: false                  # cpu: false；gpu: true

reranker:
  model: BAAI/bge-reranker-large
  device: cpu

nli:
  model: uer/roberta-base-finetuned-chinanli-chinese
  device: cpu

detection:
  if_contamination: 0.1
  lof_n_neighbors: 20
  nli_similarity_threshold: 0.3
  nli_contradiction_threshold: 0.3
  variance_threshold: 0.5
  entropy_threshold: 1.0

fusion:
  knowledge_weight: 0.30
  retrieval_weight: 0.30
  generation_weight: 0.40
